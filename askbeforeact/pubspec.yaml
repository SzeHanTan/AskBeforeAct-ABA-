name: askbeforeact
description: AI-powered fraud detection web application
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase Core & Services (Updated to latest compatible versions)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.2
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.5
  google_sign_in: ^6.2.2
  
  # Google AI (Gemini)
  google_generative_ai: ^0.4.7
  
  # State Management
  provider: ^6.1.2
  
  # Navigation
  go_router: ^14.6.2
  
  # HTTP & Networking
  http: ^1.2.2
  
  # Image Handling
  image_picker: ^1.1.2
  file_picker: ^8.1.6
  
  # UI Components
  flutter_svg: ^2.0.14
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_markdown: ^0.7.4+1
  google_fonts: ^6.2.1
  
  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.2
  uuid: ^4.5.2
  shared_preferences: ^2.3.4
  
  # Form Validation
  email_validator: ^3.0.0
  
  # Loading Indicators
  flutter_spinkit: ^5.2.2
  
  # Toast/Snackbar
  fluttertoast: ^8.2.14
  
  # Icons
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.12.0
  
  # PDF Generation
  pdf: ^3.11.1
  printing: ^5.13.4
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  
  fonts:
    - family: Noto Sans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700
    - family: Noto Sans Symbols
      fonts:
        - asset: assets/fonts/NotoSansSymbols-Regular.ttf
    - family: Noto Color Emoji
      fonts:
        - asset: assets/fonts/NotoColorEmoji.ttf